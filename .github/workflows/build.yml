name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pip install coverage
          python -m coverage run -m unittest discover -s tests
          python -m coverage report
      - name: Compile
        run: python -m compileall app.py obscuraprimus tests scripts
      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm ObscuraPrimus.spec
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObscuraPrimus-windows-x64
          path: dist/ObscuraPrimus.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          powershell -ExecutionPolicy Bypass -File scripts\build_release.ps1 -Version $version
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ObscuraPrimus.exe
            dist/ObscuraPrimus.exe.asc
            release/ObscuraPrimus-*-windows-x64.zip
            release/ObscuraPrimus-*-windows-x64.zip.asc
            release/SHA256SUMS.txt
            release/SHA256SUMS.txt.asc
            release/SBOM.json
            release/SBOM.json.asc
            release/DEPENDENCY_LICENSES.md
            release/DEPENDENCY_LICENSES.md.asc
          generate_release_notes: true
